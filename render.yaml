services:
  - type: web
    name: sharda-jewellers-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Helps Render mark the service healthy; open /health/whatsapp-config to verify env.
    healthCheckPath: /health
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGEN_MODEL
        sync: false
      - key: AI_IMAGE_GENERATION
        sync: false
      - key: JEWELLERY_MAKING_PCT_ON_24K
        sync: false
      - key: JEWELLERY_SALE_GST_PCT
        sync: false
      - key: GOLD_BOOKING_ADVANCE_PCT
        sync: false
      - key: GOLD_BOOKINGS_XLSX_PATH
        sync: false
      - key: GOLD_API_KEY
        sync: false
